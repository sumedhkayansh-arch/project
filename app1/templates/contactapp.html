<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="parent">
        <div class="title">
            <h1>Contact us</h1>
        </div>
        <div class="inputs">
            <form method="post">
                {%csrf_token%}
        <input type="text" name="name" placeholder="Enter your name"/>
        <input type="email" name="mail" placeholder="Enter your email"/>
        <input type="number" name="phonenumber" placeholder="Enter your contact number"/>
        <input type="text" name="message" placeholder="Enter consent message"/>
        <button>Send</button>
            </form>
        </div>
        
    </div>
</body>
<style>
    .parent{
        display: flex;
        flex-direction: column;
        height: 300px;
        width: 300px;
        justify-content: center;
        align-items: center;
        box-shadow: 0 4px 12px rgba(0,0,0,1);
        gap: 10px;
    }
    form{
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 10px;
    }
    input{
        width: 270px;
        height: 34px;
    }
    body{
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-image: url(https://static.vecteezy.com/system/resources/thumbnails/007/067/602/small/businessman-shows-outstretched-hand-with-social-icon-on-virtual-screen-contact-us-free-photo.jpg);
        background-repeat: no-repeat;
        background-size: 100% 100%;
    }
    h1{
        color: white;
    }
    button{
        background-color: blue;
        color: white;
        width: 120px;
        height: 30px;
        border-radius: 7px;
    }
</style>
</html>
