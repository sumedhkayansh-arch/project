<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="parent">
        <div class="top">
            <h1>Sign up</h1>
        </div>
        <div class="inputs">
            <form method="post">
                {%csrf_token%}
                <input type="text" name="sname" placeholder="Enter your name"/>
        <input type="email" name="smail" placeholder="Enter your email id"/>
        <input type="password" name="spassword" placeholder="Enter your password"/>
        <input type="text" name="conpass" placeholder="Re-enter and confirm password">
        <button type="submit">Sign up</button>
            </form>
        </div>
        
    </div>
</body>
<style>
    .parent{
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        width: 300px;
        height: 500px;
        gap: 30px;
        box-shadow: 0 4px 12px rgba(0,0,0,1);
        border-radius: 10px;
    }
    form{
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 10px;
    }
    input{
        height: 40px;
        width: 230px;
    }
    button{
        background-color: lightgreen;
        border-radius: 7px;
        width: 89px;
        height: 30px;
        font-size: 17px;
    }
    body{
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background: linear-gradient(-45deg,lightblue,lightgreen, aqua,pink,yellow);
        animation: hi 5s ease infinite;
        background-size: 200% 200%;
    }
    @keyframes hi {
        0%{
            background-position: 0% 50%;
        }
        50%{
            background-position: 50% 100%;
        }
        100%{
            background-position: 0% 50%;
        }
    }
</style>
</html>
